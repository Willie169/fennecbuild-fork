name: fennec_aaa
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build app
        run: |
          export PACKAGE_NAME='fennec_aaa'
          cd ~
          export CARGO_BUILD_JOBS=2
          export RUSTFLAGS="-C codegen-units=1"
          export ANDROID_HOME="${HOME}/Android/Sdk"
          export PATH="/opt/gradle/bin:${HOME}/.local/bin:${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools:${PATH}"
          sudo mkdir -p /opt/gradle/bin
          mkdir -p ${HOME}/.local/bin
          sudo apt update
          sudo apt purge yq -y
          sudo apt install curl git perl pipx unzip wget -y
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv bash)"
          brew install yq
          git config --global user.email you@example.com
          git config --global user.name your_name
          git clone https://gitlab.com/fdroid/fdroiddata.git
          cd fdroiddata
          rm config.yml
          touch config.yml
          git add config.yml
          cd metadata
          export VERCODE=$(awk -F': *' '/^[[:space:]]*CurrentVersionCode:/ {print $2}' org.mozilla.fennec_fdroid.yml)
          export COMMIT=$(git log --format='%H' -S"versionCode: $VERCODE" -- org.mozilla.fennec_fdroid.yml | head -n1)
          export GIT_AUTHOR_DATE="$(git show -s --format=%aI "$COMMIT")"
          export GIT_COMMITTER_DATE="$(git show -s --format=%cI "$COMMIT")"
          export NDK=$(cat org.mozilla.fennec_fdroid.yml | grep -E '[[:space:]]*ndk:' | tail -1 | sed -E 's/.*ndk:[[:space:]]*([^[:space:]]+).*/\1/')
          export SUDO="$(yq '.Builds[-1].sudo' org.mozilla.fennec_fdroid.yml | sed 's/^- //' | sed 's/^echo .* > \/etc\/apt\/sources\.list\.d\/.*$//' | sed 's/ -t bookworm//')"
          export MOZFENNEC_VERSION="$(yq '.Builds[-1].srclibs' org.mozilla.fennec_fdroid.yml | grep MozFennec@ | sed 's/- MozFennec@//')"
          export MOZAPPSERVICES_VERSION="$(yq '.Builds[-1].srclibs' org.mozilla.fennec_fdroid.yml | grep MozAppServices@ | sed 's/- MozAppServices@//')"
          export MOZGLEAN_VERSION="$(yq '.Builds[-1].srclibs' org.mozilla.fennec_fdroid.yml | grep MozGlean@ | sed 's/- MozGlean@//')"
          export MOZGLEANAS_VERSION="$(yq '.Builds[-1].srclibs' org.mozilla.fennec_fdroid.yml | grep MozGleanAS@ | sed 's/- MozGleanAS@//')"
          export UNIFIEDPUSHAC_VERSION="$(yq '.Builds[-1].srclibs' org.mozilla.fennec_fdroid.yml | grep UnifiedPushAC@ | sed 's/- UnifiedPushAC@//')"
          export GMSCORE_VERSION="$(yq '.Builds[-1].srclibs' org.mozilla.fennec_fdroid.yml | grep gmscore@ | sed 's/- gmscore@//')"
          cd ~
          git clone https://github.com/mozilla-firefox/firefox
          cd firefox
          git checkout "$MOZFENNEC_VERSION"
          cd gradle/wrapper
          export MOZFENNEC_GRADLE_URL="$(cat gradle-wrapper.properties | grep 'distributionUrl' | sed 's/distributionUrl=https\\/https/')"
          export MOZFENNEC_GRADLE_FILE="$(echo $MOZFENNEC_GRADLE_URL | sed 's/https:\/\/services\.gradle\.org\/distributions\///')"
          export MOZFENNEC_GRADLE_VERSION="$(echo $MOZFENNEC_GRADLE_FILE | sed 's/gradle-//; s/-bin\.zip//')"
          cd ~
          [ ! -f "$MOZFENNEC_GRADLE_FILE" ] && wget "$MOZFENNEC_GRADLE_URL" && unzip "$MOZFENNEC_GRADLE_FILE"
          cd ~
          git clone https://github.com/mozilla/application-services.git
          cd application-services
          git checkout "$MOZAPPSERVICES_VERSION"
          cd gradle/wrapper
          export MOZAPPSERVICES_GRADLE_URL="$(cat gradle-wrapper.properties | grep 'distributionUrl' | sed 's/distributionUrl=https\\/https/')"
          export MOZAPPSERVICES_GRADLE_FILE="$(echo $MOZAPPSERVICES_GRADLE_URL | sed 's/https:\/\/services\.gradle\.org\/distributions\///')"
          export MOZAPPSERVICES_GRADLE_VERSION="$(echo $MOZAPPSERVICES_GRADLE_FILE | sed 's/gradle-//; s/-bin\.zip//')"
          cd ~
          [ ! -f "$MOZAPPSERVICES_GRADLE_FILE" ] && wget "$MOZAPPSERVICES_GRADLE_URL" && unzip "$MOZAPPSERVICES_GRADLE_FILE"
          cd ~
          git clone https://github.com/mozilla/glean.git
          cd glean
          git checkout "$MOZGLEAN_VERSION"
          cd gradle/wrapper
          export MOZGLEAN_GRADLE_URL="$(cat gradle-wrapper.properties | grep 'distributionUrl' | sed 's/distributionUrl=https\\/https/')"
          export MOZGLEAN_GRADLE_FILE="$(echo $MOZGLEAN_GRADLE_URL | sed 's/https:\/\/services\.gradle\.org\/distributions\///')"
          export MOZGLEAN_GRADLE_VERSION="$(echo $MOZGLEAN_GRADLE_FILE | sed 's/gradle-//; s/-bin\.zip//')"
          cd ~
          [ ! -f "$MOZGLEAN_GRADLE_FILE" ] && wget "$MOZGLEAN_GRADLE_URL" && unzip "$MOZGLEAN_GRADLE_FILE"
          cd glean
          git checkout "$MOZGLEANAS_VERSION"
          cd gradle/wrapper
          export MOZGLEANAS_GRADLE_URL="$(cat gradle-wrapper.properties | grep 'distributionUrl' | sed 's/distributionUrl=https\\/https/')"
          export MOZGLEANAS_GRADLE_FILE="$(echo $MOZGLEANAS_GRADLE_URL | sed 's/https:\/\/services\.gradle\.org\/distributions\///')"
          export MOZGLEANAS_GRADLE_VERSION="$(echo $MOZGLEANAS_GRADLE_FILE | sed 's/gradle-//; s/-bin\.zip//')"
          cd ~
          [ ! -f "$MOZGLEANAS_GRADLE_FILE" ] && wget "$MOZGLEANAS_GRADLE_URL" && unzip "$MOZGLEANAS_GRADLE_FILE"
          cd ~
          git clone https://gitlab.com/ironfox-oss/unifiedpush-ac.git
          cd unifiedpush-ac
          git checkout "$UNIFIEDPUSHAC_VERSION"
          cd gradle/wrapper
          export UNIFIEDPUSHAC_GRADLE_URL="$(cat gradle-wrapper.properties | grep 'distributionUrl' | sed 's/distributionUrl=https\\/https/')"
          export UNIFIEDPUSHAC_GRADLE_FILE="$(echo $UNIFIEDPUSHAC_GRADLE_URL | sed 's/https:\/\/services\.gradle\.org\/distributions\///')"
          export UNIFIEDPUSHAC_GRADLE_VERSION="$(echo $UNIFIEDPUSHAC_GRADLE_FILE | sed 's/gradle-//; s/-bin\.zip//')"
          cd ~
          [ ! -f "$UNIFIEDPUSHAC_GRADLE_FILE" ] && wget "$UNIFIEDPUSHAC_GRADLE_URL" && unzip "$UNIFIEDPUSHAC_GRADLE_FILE"
          cd ~
          git clone https://github.com/microg/GmsCore.git
          cd GmsCore
          git checkout "$GMSCORE_VERSION"
          cd gradle/wrapper
          export GMSCORE_GRADLE_URL="$(cat gradle-wrapper.properties | grep 'distributionUrl' | sed 's/distributionUrl=https\\/https/')"
          export GMSCORE_GRADLE_FILE="$(echo $GMSCORE_GRADLE_URL | sed 's/https:\/\/services\.gradle\.org\/distributions\///')"
          export GMSCORE_GRADLE_VERSION="$(echo $GMSCORE_GRADLE_FILE | sed 's/gradle-//; s/-bin\.zip//')"
          cd ~
          [ ! -f "$GMSCORE_GRADLE_FILE" ] && wget "$GMSCORE_GRADLE_URL" && unzip "$GMSCORE_GRADLE_FILE"
          rm gradle-*.zip
          rm -rf firefox application-services glean unifiedpush-ac GmsCore
          sudo mv gradle-* /opt/gradle/
          cd ~/fdroiddata/metadata
          sed -i "s/fennec_fdroid/$PACKAGE_NAME/" org.mozilla.fennec_fdroid.yml
          sed -i 's/^    prebuild: \.\/prebuild\.sh \$\$VERSION\$\$ \$\$VERCODE\$\$/    prebuild:\n      - echo '"'"'sed -Ei '"'"'"'"'"'"'"'"'s\/\^ac_add_options --with-gradle=\\\$\\\(command -v gradle\\\)\$\/ac_add_options --with-gradle="\\\/opt\\\/gradle\\\/bin\\\/gradle"\/'"'"'"'"'"'"'"'"' prebuild.sh'"'"' \| tee patch.sh\n      - echo '"'"'perl -0777 -i -pe '"'"'"'"'"'"'"'"'s\/pushd "\\\$gmscore"\/pushd "\\\$gmscore"\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$GMSCORE_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/export TARGET_CFLAGS=-DNDEBUG\/export TARGET_CFLAGS=-DNDEBUG\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$MOZGLEAN_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/pushd "\\\$glean_as"\/pushd "\\\$glean_as"\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$MOZGLEANAS_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/export MOZ_CHROME_MULTILOCALE\/export MOZ_CHROME_MULTILOCALE\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$MOZFENNEC_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/pushd "\\\$android_components"\/pushd "\\\$android_components"\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$MOZFENNEC_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/\\.\\\/libs\\\/verify-android-environment\\.sh\/.\\\/libs\\\/verify-android-environment.sh\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$MOZAPPSERVICES_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/pushd "\\\$unifiedpush_ac"\/pushd "\\\$unifiedpush_ac"\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$UNIFIEDPUSHAC_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\/s; s\/pushd "\\\$fenix"\/pushd "\\\$fenix"\\nsudo ln -sf \\\/opt\\\/gradle\\\/gradle-'"$MOZFENNEC_GRADLE_VERSION"'\\\/bin\\\/gradle \\\/opt\\\/gradle\\\/bin\\\/gradle\\n\/s'"'"'"'"'"'"'"'"' build.sh'"'"' | tee -a patch.sh\n      - chmod +x patch.sh\n      - .\/patch.sh\n      - git grep -l "fennec_fdroid" -- . | xargs perl -pi -e "s\/fennec_fdroid\/'"$PACKAGE_NAME"'\/g"\n      - .\/prebuild.sh \$\$VERSION\$\$ \$\$VERCODE\$\$/' org.mozilla.fennec_fdroid.yml
          mv org.mozilla.fennec_fdroid.yml "org.mozilla.$PACKAGE_NAME.yml"
          mv org.mozilla.fennec_fdroid "org.mozilla.$PACKAGE_NAME"
          git rm org.mozilla.fennec_fdroid.yml
          git rm -r org.mozilla.fennec_fdroid
          git add "org.mozilla.$PACKAGE_NAME.yml"
          git add "org.mozilla.$PACKAGE_NAME"
          git commit -m commit_message
          cd ~
          sudo bash <<< "$SUDO"
          pipx install fdroidserver
          wget --tries=100 --retry-connrefused --waitretry=5 -O studio.html https://developer.android.com/studio
          export CMDLINETOOLS="$(awk '/<table class="download">/ { count++ }
          count >= 2 {
            if (match($0, /commandlinetools-linux-.*zip/)) {
              print substr($0, RSTART, RLENGTH)
              exit
            }
          }' studio.html)"
          rm studio.html
          wget --tries=100 --retry-connrefused --waitretry=5 "https://dl.google.com/android/repository/${CMDLINETOOLS}"
          unzip "$CMDLINETOOLS"
          mkdir -p ~/Android/Sdk/cmdline-tools/latest
          mv cmdline-tools/* ~/Android/Sdk/cmdline-tools/latest
          rm -r cmdline-tools*
          cd ~/Android/Sdk/cmdline-tools/latest/bin
          echo y | ./sdkmanager "platform-tools" "ndk;$NDK"
          cd ~/fdroiddata
          fdroid build "org.mozilla.$PACKAGE_NAME:$VERCODE" -v
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fennec_apks
          path: |
            ~/fdroiddata/build/srclib/MozFennec/obj/gradle/build/mobile/android/fenix/app/outputs/apk/release/app-*-release-unsigned.apk
